<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document verification | التحقق من الوثائق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1f497d;
      --primary-dark: #152f52;
      --accent: #466ab3;
      --surface: rgba(255, 255, 255, 0.92);
      --text: #1a1a2e;
      --muted: #5c6570;
      --danger: #c0392b;
      --danger-bg: #fdecea;
      --ok: #1a7f4b;
      --radius: 16px;
      --shadow: 0 12px 40px rgba(31, 73, 125, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(70, 106, 179, 0.35), transparent 55%),
        radial-gradient(900px 500px at 100% 20%, rgba(31, 73, 125, 0.25), transparent 50%),
        linear-gradient(165deg, #e8eef8 0%, #f4f7fd 45%, #eef2fb 100%);
    }
    html[dir="rtl"] body {
      font-family: "Cairo", "Plus Jakarta Sans", sans-serif;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      padding: 1rem 1.25rem;
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(31, 73, 125, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .lang-toggle button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: none;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.2s, color 0.2s, transform 0.15s;
      font-family: inherit;
    }
    .lang-toggle button:hover {
      color: var(--primary);
    }
    .lang-toggle button:active {
      transform: scale(0.97);
    }
    .lang-toggle button.is-active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 2px 12px rgba(31, 73, 125, 0.35);
    }
    .lang-toggle button svg {
      width: 1.15rem;
      height: 1.15rem;
      flex-shrink: 0;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 5.5rem 1.25rem 2.5rem;
    }

    .panel {
      background: var(--surface);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: var(--radius);
      padding: 2.25rem 1.85rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.95);
    }

    .brand {
      width: 88px;
      height: auto;
      margin: 0 auto 1.25rem;
      display: block;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0 0 1.75rem;
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    label.doc-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    html[dir="rtl"] label.doc-label {
      text-transform: none;
      letter-spacing: 0;
    }

    input#docID {
      width: 100%;
      padding: 0.95rem 1.1rem;
      border-radius: 12px;
      border: 2px solid #dde4ef;
      font-size: 1rem;
      font-family: ui-monospace, "Cascadia Code", monospace;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input#docID:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(70, 106, 179, 0.18);
    }

    .btn-primary {
      width: 100%;
      margin-top: 1.1rem;
      padding: 0.95rem 1.25rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      box-shadow: 0 4px 16px rgba(31, 73, 125, 0.3);
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 22px rgba(31, 73, 125, 0.38);
    }
    .btn-primary:active {
      transform: scale(0.99);
    }

    .error-box {
      display: none;
      margin-top: 1.25rem;
      padding: 1rem 1.15rem;
      border-radius: 12px;
      background: var(--danger-bg);
      border: 1px solid rgba(192, 57, 43, 0.2);
    }
    .error-box.is-visible { display: block; }
    .error-box p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--danger);
      line-height: 1.55;
    }
    .error-box p + p {
      margin-top: 0.65rem;
      padding-top: 0.65rem;
      border-top: 1px solid rgba(192, 57, 43, 0.15);
    }
    .error-box .tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.75;
      margin-bottom: 0.2rem;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .badge-ok {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: rgba(26, 127, 75, 0.12);
      color: var(--ok);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1rem;
      padding: 0.65rem 1.1rem;
      width: 100%;
      border-radius: 10px;
      border: 2px solid #dde4ef;
      background: #fff;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      background: #f7f9fc;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: var(--primary);
      color: #fff !important;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .download:hover {
      background: var(--primary-dark);
    }

    .pdf-frame-wrap {
      margin-top: 1.25rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #dde4ef;
      background: #f0f2f8;
      min-height: 420px;
    }
    iframe#pdfFrame {
      width: 100%;
      height: min(62vh, 560px);
      border: none;
      display: block;
    }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="lang-toggle" role="group" aria-label="Language">
      <button type="button" id="btnLangEn" class="is-active" data-lang="en" aria-pressed="true" title="English">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>
        EN
      </button>
      <button type="button" id="btnLangAr" data-lang="ar" aria-pressed="false" title="العربية">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
          <path d="M2 12h20M12 2v20" />
          <path d="M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07" opacity="0.35" />
        </svg>
        عربي
      </button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel" id="verifyBox">
      <img src="../documents/logop.png" class="brand" alt="" width="88" height="88" />
      <h1 id="title">Document verification</h1>
      <p class="sub" id="subtitle">Enter the document number to confirm it is registered.</p>

      <label class="doc-label" for="docID" id="labelDoc">Document number</label>
      <input type="text" id="docID" inputmode="numeric" autocomplete="off" spellcheck="false" />

      <button type="button" class="btn-primary" id="verifyBtn">Verify</button>

      <div class="error-box" id="errorBox" role="alert">
        <p><span class="tag">العربية</span><br /><span id="errAr">لا توجد وثيقة بهذا الرقم.</span></p>
        <p><span class="tag">English</span><br /><span id="errEn">No document matches this ID.</span></p>
      </div>

      <p class="hint" id="hint"></p>
    </div>

    <div class="panel" id="resultBox" style="display: none; margin-top: 1.25rem;">
      <img src="../documents/logop.png" class="brand" alt="" width="88" height="88" />
      <div class="result-head">
        <span class="badge-ok" id="badgeOk">✓ Verified</span>
      </div>
      <h1 id="verifiedTitle">Verified document</h1>
      <p class="sub" id="verifiedText"></p>
      <a class="download" id="downloadBtn" href="#" download>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span id="downloadLabel">Download PDF</span>
      </a>
      <div class="pdf-frame-wrap">
        <iframe id="pdfFrame" title="Document preview"></iframe>
      </div>
      <button type="button" class="btn-ghost" id="backBtn">Verify another document</button>
    </div>
  </div>

  <script>
    (function () {
      var DOC_BASE = "../documents/";

      var translations = {
        en: {
          title: "Document verification",
          subtitle: "Enter the document number to confirm it is registered.",
          labelDoc: "Document number",
          placeholder: "e.g. 20260401134567023",
          button: "Verify",
          verifiedTitle: "Verified document",
          verifiedBody: "This document number is registered. You can preview or download the official copy below.",
          download: "Download PDF",
          back: "Verify another document",
          badge: "✓ Verified",
          hint: "Enter the number exactly as it appears on your certificate or letter. If it is valid, you will see a preview and can download the PDF.",
          verifying: "Checking…",
          badId: "Use only letters, numbers, dashes, or underscores in the document ID."
        },
        ar: {
          title: "التحقق من الوثيقة",
          subtitle: "أدخل رقم الوثيقة للتأكد من أنها مسجّلة لدينا.",
          labelDoc: "رقم الوثيقة",
          placeholder: "مثال: 20260401134567023",
          button: "تحقق",
          verifiedTitle: "وثيقة موثّقة",
          verifiedBody: "رقم الوثيقة مسجّل لدينا. يمكنك معاينة النسخة الرسمية أو تحميلها أدناه.",
          download: "تحميل PDF",
          back: "التحقق من وثيقة أخرى",
          badge: "✓ موثّقة",
          hint: "أدخل الرقم كما هو مكتوب على شهادتك أو خطابك. إذا كان صحيحاً ستظهر معاينة ويمكنك تحميل ملف PDF.",
          verifying: "جاري التحقق…",
          badId: "استخدم فقط أحرفاً وأرقاماً أو شرطة/شرطة سفلية في رقم الوثيقة."
        }
      };

      var errAr = document.getElementById("errAr");
      var errEn = document.getElementById("errEn");
      var errorBox = document.getElementById("errorBox");
      var verifyBtn = document.getElementById("verifyBtn");
      var currentLang = "en";
      var defaultBtnLabel = "";

      function normalizeId(raw) {
        var s = String(raw || "").trim().replace(/\s+/g, "");
        if (!s) return "";
        if (/\.pdf$/i.test(s)) s = s.slice(0, -4);
        return s;
      }

      function isSafeDocumentId(id) {
        return id.length > 0 && id.length <= 200 && /^[a-zA-Z0-9_-]+$/.test(id);
      }

      function pdfRelativePath(id) {
        return DOC_BASE + encodeURIComponent(id) + ".pdf";
      }

      function pdfAbsoluteUrl(relativePath) {
        try {
          return new URL(relativePath, window.location.href).href;
        } catch (e) {
          return relativePath;
        }
      }

      function checkPdfExists(absoluteUrl) {
        /* Browsers block fetch() on file:// — PDF may still open in iframe; trust path after ID validation */
        if (window.location.protocol === "file:") {
          return Promise.resolve(true);
        }

        function rangeGet(u) {
          return fetch(u, {
            method: "GET",
            cache: "no-store",
            headers: { Range: "bytes=0-0" }
          }).then(function (r) {
            return r.ok || r.status === 206;
          });
        }

        return fetch(absoluteUrl, { method: "HEAD", cache: "no-store" })
          .then(function (res) {
            if (res.ok) return true;
            if (res.status === 404) return false;
            if (res.status === 405 || res.status === 501) return rangeGet(absoluteUrl);
            return rangeGet(absoluteUrl);
          })
          .catch(function () {
            return rangeGet(absoluteUrl).catch(function () {
              return false;
            });
          });
      }

      function applyLang(lang) {
        currentLang = lang;
        var t = translations[lang];
        document.documentElement.lang = lang === "ar" ? "ar" : "en";
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

        document.getElementById("title").textContent = t.title;
        document.getElementById("subtitle").textContent = t.subtitle;
        document.getElementById("labelDoc").textContent = t.labelDoc;
        document.getElementById("docID").placeholder = t.placeholder;
        defaultBtnLabel = t.button;
        if (!verifyBtn.disabled) verifyBtn.textContent = defaultBtnLabel;
        document.getElementById("verifiedTitle").textContent = t.verifiedTitle;
        document.getElementById("verifiedText").textContent = t.verifiedBody;
        document.getElementById("downloadLabel").textContent = t.download;
        document.getElementById("backBtn").textContent = t.back;
        document.getElementById("badgeOk").textContent = t.badge;
        document.getElementById("hint").textContent = t.hint;

        document.getElementById("btnLangEn").classList.toggle("is-active", lang === "en");
        document.getElementById("btnLangAr").classList.toggle("is-active", lang === "ar");
        document.getElementById("btnLangEn").setAttribute("aria-pressed", lang === "en" ? "true" : "false");
        document.getElementById("btnLangAr").setAttribute("aria-pressed", lang === "ar" ? "true" : "false");
      }

      function showError() {
        errAr.textContent = "لا توجد وثيقة بهذا الرقم.";
        errEn.textContent = "No document matches this ID.";
        errorBox.classList.add("is-visible");
      }

      function showBadId() {
        errAr.textContent = translations.ar.badId;
        errEn.textContent = translations.en.badId;
        errorBox.classList.add("is-visible");
      }

      function hideError() {
        errorBox.classList.remove("is-visible");
      }

      function showResult(relativePath, id) {
        document.getElementById("verifyBox").style.display = "none";
        document.getElementById("resultBox").style.display = "block";
        var frameSrc = pdfAbsoluteUrl(relativePath);
        document.getElementById("pdfFrame").src = frameSrc;
        var dl = document.getElementById("downloadBtn");
        dl.href = frameSrc;
        dl.setAttribute("download", id + ".pdf");
        applyLang(currentLang);
      }

      function runVerify() {
        hideError();
        var id = normalizeId(document.getElementById("docID").value);
        if (!id) return;

        if (!isSafeDocumentId(id)) {
          showBadId();
          return;
        }

        var relPath = pdfRelativePath(id);
        var absUrl = pdfAbsoluteUrl(relPath);
        var t = translations[currentLang];
        verifyBtn.disabled = true;
        verifyBtn.textContent = t.verifying;

        checkPdfExists(absUrl).then(function (ok) {
          verifyBtn.disabled = false;
          verifyBtn.textContent = defaultBtnLabel || translations[currentLang].button;
          if (ok) showResult(relPath, id);
          else showError();
        });
      }

      function goBack() {
        document.getElementById("resultBox").style.display = "none";
        document.getElementById("verifyBox").style.display = "block";
        document.getElementById("pdfFrame").removeAttribute("src");
        document.getElementById("docID").value = "";
        hideError();
      }

      document.getElementById("btnLangEn").addEventListener("click", function () {
        applyLang("en");
      });
      document.getElementById("btnLangAr").addEventListener("click", function () {
        applyLang("ar");
      });
      document.getElementById("verifyBtn").addEventListener("click", runVerify);
      document.getElementById("backBtn").addEventListener("click", goBack);
      document.getElementById("docID").addEventListener("keydown", function (e) {
        if (e.key === "Enter") runVerify();
      });

      applyLang("en");
    })();
  </script>
</body>
</html>
